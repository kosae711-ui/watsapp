<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wa-container">
        <div class="wa-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="wa-logo">
        </div>
        
        <div class="wa-body">
            <div class="user-info">
                <img src="img/your-profile.jpg" alt="Profile" class="profile-pic">
                <h3>Your Name</h3>
                <p>WhatsApp Business Account</p>
            </div>
            
            <div class="action-box">
                <p>Chat with <b>+966 5X XXX XXXX</b> on WhatsApp</p>
                <button class="btn-continue" onclick="startHook()">CONTINUE TO CHAT</button>
            </div>
            
            <div class="wa-footer-text">
                <p>Don't have WhatsApp yet?<br><a href="#">Download</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
